# fly.toml app configuration file generated for WAF Backend
# Run 'fly deploy' to deploy the app, or 'fly launch' to configure it.

app = "context-aware-waf-backend" # Rename this to a unique name if it is already taken
primary_region = "lax"            # Change this to your preferred region (e.g. iad, ams, sin)

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/app/data/security.db"
  LOG_FILE_PATH = "/app/data/access.log"

[[mounts]]
  source = "waf_data"
  destination = "/app/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256  # Fits within the 256MB/512MB free tier limit
